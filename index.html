<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack | Carbon Footprint Assessment</title>
    <meta name="description"
        content="Calculate your carbon footprint, explore personalized recommendations, and discover ways to reduce your environmental impact.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Icons (Lucide via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Chart.js for Donut & Bar Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Dexie.js for IndexedDB Database Analytics -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- Main Navigation -->
        <nav class="navbar">
            <div class="logo">
                <i data-lucide="leaf"></i>
                <span>EcoTrack</span>
            </div>
            
            <div class="nav-links">
                <a href="#landing" class="nav-link active">Overview</a>
                <a href="#questionnaire" class="nav-link">Analysis</a>
                <a href="#solutions" class="nav-link">Solutions</a>
                <a href="#about" class="nav-link">About Us</a>
            </div>

            <div class="nav-right">
                <button class="icon-btn" id="ai-chat-btn" title="AI-Powered Recommendations">
                    <i data-lucide="bot" style="width: 20px; height: 20px;"></i>
                </button>
                <button class="icon-btn auth-avatar" id="signin-nav-btn"><i data-lucide="user" style="width: 20px; height: 20px;"></i></button>
                <div id="user-profile" style="display: none; align-items: center; gap: 0.5rem; border-left: 1px solid var(--border-subtle); padding-left: 1rem; margin-left: 0.5rem;">
                    <a href="#profile" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--text-primary); transition: opacity var(--transition-fast);">
                        <img id="nav-profile-pic" src="https://ui-avatars.com/api/?name=User&background=0f3d2b&color=fff" alt="Profile" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                        <span style="font-size: 0.9rem; font-weight: 500;">User Profile</span>
                    </a>
                    <button class="icon-btn" id="signout-nav-btn" title="Sign Out"><i data-lucide="log-out" style="width: 18px; height: 18px;"></i></button>
                </div>
            </div>
        </nav>

        <!-- Dynamic Content Container -->
        <main id="main-content">
            <!-- Content injected via JS -->
        </main>

        <!-- AI Chatbot Drawer -->
        <div id="chat-drawer" class="chat-drawer">
            <div class="chat-header">
                <div style="display:flex; align-items:center; gap:0.5rem;">
                    <i data-lucide="bot" style="width: 20px; color: var(--accent-primary);"></i>
                    <strong style="font-size: 1rem; color: var(--text-primary);">EcoBot Assistant</strong>
                </div>
                <button class="icon-btn" id="close-chat-btn" style="padding:0;"><i data-lucide="x" style="width: 18px;"></i></button>
            </div>
            <div class="chat-body" id="chat-body">
                <div class="chat-msg bot-msg">
                    <p>Hello! 🌱 I am your simulated AI Eco-Assistant. I analyze your carbon footprint data to provide personalized recommendations. What would you like to explore today?</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask about reducing your footprint..." autocomplete="off">
                <button id="send-chat-btn"><i data-lucide="send" style="width: 18px;"></i></button>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>

</html>
